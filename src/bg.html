<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GAME OVER</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
    }

    .screen {
      width: 800px;
      height: 600px;
      background: #000;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px #00f, 0 0 80px #f0f;
      border: 4px solid #444;
    }

    /* Scanline + subtle vignette */
    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0px,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 2px,
          transparent 3px
        );
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, transparent 0, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
      pointer-events: none;
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      font-family: "Press Start 2P", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .title {
      font-size: 56px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ff004c;
      text-shadow:
        0 0 8px #ff004c,
        0 0 16px #ff004c,
        0 0 32px #ff00ff,
        4px 4px 0 #000;
      animation: glow 1.4s ease-in-out infinite alternate;
    }

    .subtitle {
      margin-top: 40px;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #00e5ff;
      text-shadow:
        0 0 6px #00e5ff,
        0 0 12px #00e5ff;
      animation: blink 1s steps(2, start) infinite;
    }

    .score {
      position: absolute;
      top: 30px;
      left: 40px;
      font-size: 14px;
      color: #00ff7f;
      text-shadow: 0 0 6px #00ff7f;
    }

    .credit {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 14px;
      color: #ffa500;
      text-shadow: 0 0 6px #ffa500;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 4px #ff004c,
          0 0 10px #ff004c,
          0 0 18px #ff00ff,
          2px 2px 0 #000;
        transform: scale(1);
      }
      to {
        text-shadow:
          0 0 10px #ff004c,
          0 0 20px #ff004c,
          0 0 40px #ff00ff,
          4px 4px 0 #000;
        transform: scale(1.03);
      }
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>

  <!-- Optional: pixel/arcade font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="screen">
    <div class="score">SCORE&nbsp;  004250</div>

    <div class="content">
      <div class="title">GAME&nbsp;OVER</div>
      <div class="subtitle">PRESS&nbsp;START&nbsp;TO&nbsp;CONTINUE</div>
    </div>

    <div class="credit">CREDIT&nbsp;  01</div>
  </div>
</body>
</html>
